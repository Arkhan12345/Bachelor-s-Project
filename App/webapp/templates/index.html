{% extends "base.html" %}
{% block title %}Search{% endblock %}
{% block content %}

<div class="stack">
  <div>
    <h2 class="page-title">Gene search</h2>
    <p class="page-subtitle">Select a gene and compute related independent components and pathway enrichments.</p>
  </div>

  <div class="card">
    <form action="{{ url_for('search') }}" method="get">
      <div class="toolbar">
        <div class="col" style="max-width: 260px;">
          <label for="geneset">Gene set database</label>
          <select id="geneset" name="geneset">
            {% for gs in genesets %}
              <option value="{{ gs.id }}">{{ gs.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="grow">
          <label for="gene">Gene (EntrezID, Symbol, or Gene title)</label>
          <div class="gene-field">
            <input type="text"
                  id="gene"
                  name="gene"
                  placeholder="e.g., TP53 or 7157 or tumor protein p53"
                  autocomplete="off"
                  required />
            <div id="gene_dropdown" class="suggestions hidden" role="listbox"></div>
          </div>
          <input type="hidden" id="entrez" name="entrez" />
          <input type="hidden" id="symbol" name="symbol" />
          <input type="hidden" id="genetitle" name="genetitle" />
        </div>

        <div class="toolbar-actions">
          <button type="submit">Search</button>
        </div>
      </div>
    </form>
  </div>
</div>



<script src="{{ url_for('static', filename='search.js') }}"></script>
{% endblock %}
