{% extends "base.html" %}
{% block title %}Search{% endblock %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
<div class="container">
  <form action="{{ url_for('search') }}" method="get">
    <div class="row" align-items-center>
      <div class="col" style="max-width: 260px;">
        <label for="geneset">Gene set database</label>
        <select id="geneset" name="geneset">
          {% for gs in genesets %}
            <option value="{{ gs.id }}">{{ gs.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="row" align-items-center>
        <label for="gene">Search gene (EntrezID, Symbol, or GeneTitle)</label>
        <input type="text" id="gene" name="gene" placeholder="e.g., TP53 or 7157 or tumor protein p53" list="gene_options" autocomplete="off" required />
        <datalist id="gene_options"></datalist>
        <input type="hidden" id="entrez" name="entrez" />
        <input type="hidden" id="symbol" name="symbol" />
        <input type="hidden" id="genetitle" name="genetitle" />
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-primary">Search</button>
      </div>
    </div>
  </form>

  <div id="chat-widget">
    <button id="chat-toggle" aria-label="Open assistant">💬</button>

    <div id="chat-panel" class="hidden">
      <div id="chat-header">
        <span>Assistant</span>
        <button id="chat-close" aria-label="Close assistant">✕</button>
      </div>

      <div id="chat-messages"></div>

      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Ask something..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='chat.js') }}"></script>
<script>
(function(){
  const geneInput = document.getElementById('gene');
  const datalist = document.getElementById('gene_options');
  const entrez = document.getElementById('entrez');
  const symbol = document.getElementById('symbol');
  const genetitle = document.getElementById('genetitle');
  let lastItems = [];
  let timer;

  geneInput.addEventListener('input', function(){
    const q = geneInput.value.trim();
    entrez.value = '';
    symbol.value = '';
    genetitle.value = '';
    if (timer) clearTimeout(timer);
    timer = setTimeout(async () => {
      if (!q) { datalist.innerHTML = ''; lastItems = []; return; }
      try {
        const res = await fetch(`{{ url_for('api_gene_suggest') }}?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        lastItems = data.items || [];
        datalist.innerHTML = '';
        for (const it of lastItems) {
          const opt = document.createElement('option');
          opt.value = it.label;
          datalist.appendChild(opt);
        }
      } catch (e) {
        // ignore
      }
    }, 200);
  });

  geneInput.addEventListener('change', function(){
    const val = geneInput.value.trim();
    const hit = lastItems.find(it => it.label === val);
    if (hit) {
      entrez.value = hit.entrez || '';
      symbol.value = hit.symbol || '';
      genetitle.value = hit.genetitle || '';
      geneInput.value = hit.label; // show all three
    }
  });
})();
</script>
{% endblock %}
